services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary datastore
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: recipedb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-recipedb}
      POSTGRES_USER:     ${POSTGRES_USER:-recipeapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro   # runs *.sql on first init
      - ./backups:/backups                             # mount for pg_dump output
    ports:
      - "127.0.0.1:5432:5432"                         # localhost only — never expose publicly
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipeapp} -d ${POSTGRES_DB:-recipedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb                                    # recommended for Postgres performance
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c wal_level=replica
        -c archive_mode=off
        -c log_min_duration_statement=1000
        -c log_connections=on
        -c log_disconnections=on

  # ---------------------------------------------------------------------------
  # Redis — cache, sessions, pub/sub for chat
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: recipedb_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --appendonly no
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PgAdmin — web UI for database inspection (dev/staging only)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: recipedb_pgadmin
    restart: unless-stopped
    profiles: ["dev"]                                  # only starts with: docker compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro   # auto-registers the db
    ports:
      - "127.0.0.1:5050:80"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Backup sidecar — daily pg_dump via cron
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: recipedb_backup
    restart: unless-stopped
    profiles: ["prod"]                                 # only starts with: docker compose --profile prod up
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "chmod +x /backup.sh && crond -f -d 8 & while true; do /backup.sh; sleep 86400; done"]

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
    name: recipeapp_backend
